# Automatically build the project and run any configured tests for every push
# and submitted pull request. This can help catch issues that only occur on
# certain platforms or Java versions, and provides a first line of defence
# against bad commits.

name: build
on:
  pull_request:
  push:
  workflow_dispatch:
    inputs:
      run_client_gametests:
        description: Run headless client GameTests
        required: false
        type: boolean
        default: true

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - name: checkout repository
        uses: actions/checkout@v5

      - name: install workflow tools
        run: |
          sudo apt-get update
          sudo apt-get install -y curl jq perl ripgrep shellcheck shfmt tar

      - name: install actionlint
        env:
          ACTIONLINT_VERSION: "1.7.12"
        run: |
          curl -sSLo /tmp/actionlint.tar.gz "https://github.com/rhysd/actionlint/releases/download/v${ACTIONLINT_VERSION}/actionlint_${ACTIONLINT_VERSION}_linux_amd64.tar.gz"
          tar -xzf /tmp/actionlint.tar.gz -C /tmp actionlint
          sudo install -m 0755 /tmp/actionlint /usr/local/bin/actionlint

      # BEGIN TEMPLATE SCRIPT CHECKS
      - name: shellcheck scripts
        run: |
          shopt -s nullglob
          scripts=(.github/scripts/*.sh)
          if [ -f init.sh ]; then
            scripts+=(init.sh)
          fi
          if [ "${#scripts[@]}" -eq 0 ]; then
            echo "No shell scripts to check"
            exit 0
          fi
          shellcheck "${scripts[@]}"

      - name: format check scripts
        run: |
          shopt -s nullglob
          scripts=(.github/scripts/*.sh)
          if [ -f init.sh ]; then
            scripts+=(init.sh)
          fi
          if [ "${#scripts[@]}" -eq 0 ]; then
            echo "No shell scripts to format-check"
            exit 0
          fi
          shfmt -d -i 2 -ci "${scripts[@]}"
      # END TEMPLATE SCRIPT CHECKS

      - name: lint workflows
        run: actionlint

      - name: validate gradle wrapper
        uses: gradle/actions/wrapper-validation@v5

      - name: setup jdk
        uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'microsoft'

      - name: make gradle wrapper executable
        run: chmod +x ./gradlew

      - name: build
        run: ./gradlew build

      # BEGIN TEMPLATE MODRINTH SCRIPT TESTS
      - name: test Modrinth scripts
        if: ${{ hashFiles('.github/scripts/test_modrinth_scripts.sh') != '' }}
        run: bash .github/scripts/test_modrinth_scripts.sh
      # END TEMPLATE MODRINTH SCRIPT TESTS

      # BEGIN TEMPLATE SMOKE TESTS
      - name: smoke test generated templates
        if: ${{ hashFiles('init.sh') != '' && hashFiles('.github/scripts/smoke_template_generation.sh') != '' }}
        run: bash .github/scripts/smoke_template_generation.sh
      # END TEMPLATE SMOKE TESTS

      - name: store reports
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: reports
          path: |
            **/build/reports/
            **/build/test-results/

      - name: capture build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: Artifacts
          path: build/libs/

  client-gametests:
    name: client GameTests
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    if: ${{ vars.RUN_CLIENT_GAMETESTS != 'false' && (github.event_name != 'workflow_dispatch' || inputs.run_client_gametests) }}
    steps:
      - name: checkout repository
        uses: actions/checkout@v5

      - name: detect client test support
        id: client-test-support
        run: |
          if [ -d src/client ] || find src/main/resources -maxdepth 1 -name '*.client.mixins.json' -print -quit | grep -q .; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
          fi

      - name: install client test tools
        if: ${{ steps.client-test-support.outputs.present == 'true' }}
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb mesa-utils libflite1 libgl1-mesa-dri libglx-mesa0 libxi6 libxrandr2 libxrender1 libxtst6 libxinerama1 libxcursor1 libxxf86vm1

      - name: validate gradle wrapper
        if: ${{ steps.client-test-support.outputs.present == 'true' }}
        uses: gradle/actions/wrapper-validation@v5

      - name: setup jdk
        if: ${{ steps.client-test-support.outputs.present == 'true' }}
        uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'microsoft'

      - name: setup gradle
        if: ${{ steps.client-test-support.outputs.present == 'true' }}
        uses: gradle/actions/setup-gradle@v5

      - name: make gradle wrapper executable
        if: ${{ steps.client-test-support.outputs.present == 'true' }}
        run: chmod +x ./gradlew

      - name: run client GameTests
        if: ${{ steps.client-test-support.outputs.present == 'true' }}
        env:
          ALSOFT_DRIVERS: "null"
          LIBGL_ALWAYS_SOFTWARE: "1"
        run: xvfb-run -a --server-args="-screen 0 1280x720x24" ./gradlew --no-daemon runClientGameTest

      - name: store client GameTest reports
        if: ${{ failure() && steps.client-test-support.outputs.present == 'true' }}
        uses: actions/upload-artifact@v7
        with:
          name: client-gametest-reports
          path: |
            **/build/reports/
            **/build/test-results/
            **/build/run/clientGameTest/logs/
